version: 3
scoping_dimension: account_id

dimensions:
  - name: account_id
    source:
      kind: request_header
      header: x-acme-account-id
      when_missing: reject
    scoping: true
    required: true
    cedar:
      attribute: account
      type: String
    clickhouse:
      column: dim_account_id
      codec: LowCardinality(String)
    pii: false

  - name: bot_id
    source:
      kind: context
      path: bot_id
    required: true
    cedar: { attribute: bot, type: String }
    clickhouse: { column: dim_bot_id, codec: String }
    pii: false

  - name: environment
    source:
      kind: derived
      template: '${bot_id | regex_extract "_(sandbox|dev|prod)$" | default "prod"}'
      enum: [sandbox, dev, prod]
    required: true
    cedar: { attribute: environment, type: String }
    clickhouse: { column: dim_environment, codec: 'LowCardinality(String)' }

  - name: end_user_id
    source:
      kind: context
      path: user_id
    pii: hash
    cedar: { attribute: user, type: String }
    clickhouse: { column: dim_user_id_h, codec: String }

  - name: user_class
    source:
      kind: enrichment
      enrichment_ref: classify_user
    required: false
    cedar:
      attribute: user_class
      type: String
      enum: [paying, trial, demo, anonymous]
    clickhouse: { column: dim_user_class, codec: 'LowCardinality(String)' }

enrichments:
  classify_user:
    kind: webhook
    url: https://acme-internal.example.com/api/lupid/classify_user
    timeout_ms: 250
    on_failure: fail_open
    include_dimensions: [account_id, end_user_id]
